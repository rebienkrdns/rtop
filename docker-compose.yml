services:
  dev:
    image: rust:latest
    working_dir: /app
    volumes:
      # Source code (sincronizado desde el host)
      - .:/app
      # Volumen separado para el directorio target (evita colisión macOS/Linux y mejora I/O)
      - cargo-target:/app/target
      # Caché global del registro de Cargo (evita re-descargar crates entre sesiones)
      - cargo-cache:/usr/local/cargo/registry
    stdin_open: true   # equivalente a -i
    tty: true          # equivalente a -t, necesario para que ratatui renderice correctamente
    # Instala stress-ng al arrancar y se mantiene vivo esperando conexiones
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends stress-ng &&
        echo '✔ stress-ng instalado' &&
        sleep infinity
      "

  # ---------------------------------------------------------------------------
  # Simuladores de carga PSI — se invocan de forma independiente con:
  #   docker compose run --rm stress-cpu
  #   docker compose run --rm stress-mem
  #   docker compose run --rm stress-io
  # Cada servicio corre en el mismo namespace de kernel que `dev`, por lo que
  # los valores de /proc/pressure/* subirán y serán visibles en rtop.
  # ---------------------------------------------------------------------------

  stress-cpu:
    image: rust:latest
    profiles: [stress]
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends stress-ng &&
        echo '▶ CPU stress activo — Ctrl+C para detener' &&
        stress-ng --cpu 0 --cpu-load 90 --metrics-brief
      "

  stress-mem:
    image: rust:latest
    profiles: [stress]
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends stress-ng &&
        echo '▶ Memory stress activo — Ctrl+C para detener' &&
        stress-ng --vm 4 --vm-bytes 256M --vm-hang 0 --metrics-brief
      "

  stress-io:
    image: rust:latest
    profiles: [stress]
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends stress-ng &&
        echo '▶ I/O stress activo — Ctrl+C para detener' &&
        stress-ng --iomix 4 --iomix-bytes 512M --metrics-brief
      "

volumes:
  cargo-target:
  cargo-cache:
